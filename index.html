<style>
:root{
  --bg:#080808;
  --border:rgba(255,255,255,.1);
  --accent:#6a5cff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;left:0;right:0;
  height:70px;
  z-index:1000;
  background:rgba(8,8,8,.6);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.header-inner{
  height:100%;
  padding:0 64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
nav a{
  margin-left:24px;
  font-size:11px;
  letter-spacing:3px;
  color:#aaa;
  text-decoration:none;
}
nav a:hover{color:#fff}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  padding:120px 64px 60px;
  display:flex;
  align-items:center;
}
.hero video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:.12;
  pointer-events:none;
}
.hero-content{
  position:relative;
  max-width:720px;
}
.profile{
  width:120px;height:120px;
  border-radius:24px;
  object-fit:cover;
  border:1px solid var(--border);
  margin-bottom:32px;
}
h1{
  font-size:clamp(48px,8vw,90px);
  margin:0;
}
.hero p{opacity:.6}

/* SECTIONS */
.section{padding:100px 0}
.section-header{
  padding:0 64px 24px;
  display:flex;
  align-items:center;
  gap:16px;
}
.section-header .line{
  flex:1;height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}

/* HORIZONTAL VIDEO */
.scroll{
  display:flex;
  gap:32px;
  padding:16px 64px 40px;
  overflow-x:auto;
}
.card{
  flex:0 0 280px;
}
.frame{
  position:relative;
  width:100%;
  padding-top:177.78%;
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--border);
  background:#111;
}
iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
}

/* CONTACT */
.contact{
  padding:100px 24px;
  text-align:center;
  background:#0c0c0c;
}

/* MOBILE */
@media(max-width:768px){
  .header-inner,.scroll,.section-header{padding:0 20px}
  nav{display:none}
  .card{flex:0 0 70vw}
}
</style>
</head>
